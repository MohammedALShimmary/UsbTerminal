name: Build Android APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # We use Java 11 here, as it's the safest bridge for Gradle 7.x
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11' 
        distribution: 'temurin'

    # Force generation of an older, compatible Gradle engine
    - name: Generate Legacy Engine
      run: gradle wrapper --gradle-version 7.4.2

    - name: Make Engine Executable
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UsbTerminal-Test-Build
        path: app/build/outputs/apk/debug/*.apk
