name: Build Android APK

on:
  workflow_dispatch:

env:
  # This shuts up the Node.js warning you saw
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04 # Downgrade the server OS to support older build tools

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8' # Force Java 8 for legacy Android compatibility
        distribution: 'temurin'

    - name: Make Gradle Executable
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UsbTerminal-Test-Build
        path: app/build/outputs/apk/debug/*.apk
